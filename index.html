  /* ハンバーガーアイコン */
.hamburger {
  position: fixed;

  left: 10px;
  font-size: 28px;
  cursor: pointer;
  z-index: 1000;
  user-select: none;

/* サイドメニュー */
.side-menu {
  position: fixed;
  top: 0;
  left: -250px; /* 初期は隠す */

  height: 100%;
  background: #333;
  color: #fff;
  padding-top: 60px;
  transition: left 0.3s ease;
  z-index: 999;

.side-menu ul {

}

.side-menu li {

.side-menu a {

  font-size: 18px;
}

.side-menu a:hover {

}

/* メニュー展開時 */
.side-menu.open {
  left: 0;
}

    margin: 40px auto;

    max-width: 500px;
    position: relative;

  .suggest-box {

    border: 1px solid #ccc;
    border-top: none;
    max-height: 200px;
    overflow-y: auto;
    display: none;

    align-items: center;

  }

    height: 40px;

    hya:"ひゃ", hyu:"ひゅ", hyo:"ひょ",
    mya:"みゃ", myu:"みゅ", myo:"みょ",
    rya:"りゃ", ryu:"りゅ", ryo:"りょ",
    gya:"ぎゃ", gyu:"ぎゅ", gyo:"ぎょ",
    ja:"じゃ", ju:"じゅ", jo:"じょ", zya:"じゃ", zyu:"じゅ", zyo:"じょ",
    bya:"びゃ", byu:"びゅ", byo:"びょ",
    pya:"ぴゃ", pyu:"ぴゅ", pyo:"ぴょ",

    // 促音
    kka:"っか", kki:"っき", kku:"っく", kke:"っけ", kko:"っこ",
    ssa:"っさ", ssi:"っし", ssu:"っす", sse:"っせ", sso:"っそ",
    tta:"った", tti:"っち", ttu:"っつ", tte:"って", tto:"っと", cchi:"っち",

    //濁音
    ga: "が", gi: "ぎ", gu: "ぐ", ge: "げ", go: "ご",
    za: "ざ", ji: "じ", zu: "ず", ze: "ぜ", zo: "ぞ",
    da: "だ", di: "ぢ", du: "づ", de: "で", do: "ど",
    ba: "ば", bi: "び", bu: "ぶ", be: "べ", bo: "ぼ",

    //半濁音
    pa: "ぱ", pi: "ぴ", pu: "ぷ", pe: "ぺ", po: "ぽ",

    // 五十音
    ka:"か", ki:"き", ku:"く", ke:"け", ko:"こ",
    sa:"さ", si:"し", su:"す", se:"せ", so:"そ",
    ta:"た", ti:"ち", tu:"つ", te:"て", to:"と",
    na:"な", ni:"に", nu:"ぬ", ne:"ね", no:"の",
    ha:"は", hi:"ひ", hu:"ふ", he:"へ", ho:"ほ",
    ma:"ま", mi:"み", mu:"む", me:"め", mo:"も",
    ya:"や", yu:"ゆ", yo:"よ",
    ra:"ら", ri:"り", ru:"る", re:"れ", ro:"ろ",
    wa:"わ", wo:"を", nn:"ん", n:"ん",
    a:"あ", i:"い", u:"う", e:"え", o:"お",

    k:"か", k:"き", k:"く", k:"け", k:"こ",
    s:"さ", s:"し", s:"す", s:"せ", s:"そ",
    t:"た", t:"ち", t:"つ", t:"て", t:"と",
    n:"な", n:"に", n:"ぬ", n:"ね", n:"の",
    h:"は", h:"ひ", h:"ふ", h:"へ", h:"ほ",
    m:"ま", m:"み", m:"む", m:"め", m:"も",
    y:"や", y:"ゆ", y:"よ",
    r:"ら", r:"り", r:"る", r:"れ", r:"ろ",
  };

  let result = str.toLowerCase();
  const keys = Object.keys(table).sort((a, b) => b.length - a.length);
  keys.forEach(key => {
    result = result.replace(new RegExp(key, "g"), table[key]);
  });
  return result;
}

// ▼ normalize（全部ひらがなに統一）
function normalize(str) {
  // 半角カナ → 全角
  str = str.replace(/[\uFF65-\uFF9F]/g, s =>
    String.fromCharCode(s.charCodeAt(0) - 0xFEC0)
  );

  // カタカナ → ひらがな
  str = str.replace(/[\u30A1-\u30F6]/g, s =>
    String.fromCharCode(s.charCodeAt(0) - 0x60)
  );

  // ローマ字 → ひらがな
  str = romajiToHiragana(str);

  return str;
}

// ▼ 複数 key 対応の検索
function showSuggestions(token) {
  const list = DICT.filter(item =>
    item.keys.some(k => normalize(k).startsWith(token))
  );

  if (list.length === 0) {
    suggestBox.style.display = "none";
    suggestBox.innerHTML = "";
    return;
  }

  suggestBox.innerHTML = "";

  list.forEach(item => {
    const div = document.createElement("div");
    div.className = "suggest-item";

    const img = document.createElement("img");
    img.src = item.img;

    const span = document.createElement("span");
    span.textContent = item.label;

    div.appendChild(img);
    div.appendChild(span);

    // ★ 候補を押したらリンクに飛ぶ
    div.addEventListener("click", () => {
      window.location.href = item.url;
    });

    suggestBox.appendChild(div);
  });

  suggestBox.style.display = "block";
}

// ▼ 入力イベント
textarea.addEventListener("input", () => {

  if (raw === "") {
    suggestBox.style.display = "none";
    return;
  }

  const token = normalize(raw);
  showSuggestions(token);
});
