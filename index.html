<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>カレンダー完成版</title>

<style>
  * { box-sizing: border-box; }
  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 0;
    background: #f5f5f5;
  }

  /* スマホ幅にフィット */
  .calendar-wrapper {
    max-width: 390px;
    width: 100%;
    margin: 0 auto;
    padding: 10px;
    background: #fff;
    min-height: 100vh;
  }

  .cal-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }

  .cal-title {
    font-weight: bold;
    font-size: 18px;
  }

  .calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 2px;
    align-content: start;
    width: 100%;
  }

  .dow {
    text-align: center;
    padding: 4px 0;
    background: #eee;
    font-size: 12px;
    font-weight: bold;
  }

  .day-cell {
    min-height: 52px;
    background: #fafafa;
    border-radius: 4px;
    padding: 2px;
    font-size: 11px;
    position: relative;
  }

  .today {
    outline: 2px solid #ff4d4d;
    background: #ffecec;
  }

  .event {
    margin-top: 2px;
    padding: 1px 2px;
    border-radius: 3px;
    color: #fff;
    font-size: 10px;
    cursor: pointer;
  }

  /* モーダル（カレンダーの上に重ねる） */
  .modal-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }

  .modal {
    background: #fff;
    padding: 15px;
    width: 90%;
    max-width: 360px;
    border-radius: 8px;
    z-index: 10000;
  }

  .modal input, .modal select {
    width: 100%;
    padding: 6px;
    margin-bottom: 8px;
  }

  .digit-boxes {
    margin: 8px 0;
  }
  .digit-boxes label {
    margin-right: 6px;
    font-size: 14px;
  }

  .color-buttons button {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: none;
    margin-right: 6px;
  }

  .btn-row {
    display: flex;
    justify-content: space-between;
  }

  .btn-row button {
    padding: 6px 10px;
    font-size: 14px;
  }
</style>
</head>

<body>

<div class="calendar-wrapper" id="swipeArea">
  <div class="cal-header">
    <button id="prevMonth">&lt;</button>
    <div class="cal-title" id="calTitle"></div>
    <button id="nextMonth">&gt;</button>
  </div>

  <div class="calendar-grid" id="calendar"></div>
</div>

<!-- 予定追加・編集モーダル -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitle">予定を追加</h3>

    <input type="text" id="modalEventTitle" placeholder="予定タイトル">

    <select id="modalRepeat">
      <option value="none">繰り返しなし</option>
      <option value="weekly">毎週</option>
      <option value="monthly">毎月</option>
      <option value="yearly">毎年</option>
    </select>

    <div class="digit-boxes" id="digitBoxes">
      <div>数字が付く日（複数選択可）</div>
      <label><input type="checkbox" value="0">0</label>
      <label><input type="checkbox" value="1">1</label>
      <label><input type="checkbox" value="2">2</label>
      <label><input type="checkbox" value="3">3</label>
      <label><input type="checkbox" value="4">4</label>
      <label><input type="checkbox" value="5">5</label>
      <label><input type="checkbox" value="6">6</label>
      <label><input type="checkbox" value="7">7</label>
      <label><input type="checkbox" value="8">8</label>
      <label><input type="checkbox" value="9">9</label>
    </div>

    <div class="color-buttons" id="modalColors">
      <button data-color="#007bff" style="background:#007bff"></button>
      <button data-color="#28a745" style="background:#28a745"></button>
      <button data-color="#ffc107" style="background:#ffc107"></button>
      <button data-color="#dc3545" style="background:#dc3545"></button>
      <button data-color="#6f42c1" style="background:#6f42c1"></button>
    </div>

    <div class="btn-row">
      <button id="modalSave">保存</button>
      <button id="modalDelete" style="background:#dc3545;color:#fff;display:none;">削除</button>
      <button id="modalClose">閉じる</button>
    </div>
  </div>
</div>

<!-- 予定一覧モーダル -->
<div class="modal-bg" id="listModalBg">
  <div class="modal">
    <h3 id="listModalTitle">予定一覧</h3>
    <div id="listContent"></div>
    <button id="listClose">閉じる</button>
  </div>
</div>

<script>
/* -------------------------
   基本変数
------------------------- */
let events = [];
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let selectedDate = null;
let editingId = null;
let modalColor = "#007bff";

/* -------------------------
   保存・読み込み
------------------------- */
function saveEvents() {
  localStorage.setItem("calendarEvents", JSON.stringify(events));
}
function loadEvents() {
  const data = localStorage.getItem("calendarEvents");
  if (data) events = JSON.parse(data);
}
loadEvents();

/* -------------------------
   カレンダー描画
------------------------- */
const calendarEl = document.getElementById("calendar");
const calTitleEl = document.getElementById("calTitle");

function renderCalendar() {
  calendarEl.innerHTML = "";

  const dow = ["日","月","火","水","木","金","土"];
  dow.forEach(d => {
    const h = document.createElement("div");
    h.className = "dow";
    h.textContent = d;
    calendarEl.appendChild(h);
  });

  const first = new Date(currentYear, currentMonth, 1);
  const startDow = first.getDay();
  const days = new Date(currentYear, currentMonth + 1, 0).getDate();

  calTitleEl.textContent = `${currentYear}年 ${currentMonth+1}月`;

  for (let i=0;i<startDow;i++){
    const empty = document.createElement("div");
    empty.className = "day-cell";
    calendarEl.appendChild(empty);
  }

  for (let d=1; d<=days; d++){
    const cell = document.createElement("div");
    cell.className = "day-cell";

    const dateObj = new Date(currentYear, currentMonth, d);
    const dateStr = toStr(dateObj);

    if (isSame(dateObj, new Date())) cell.classList.add("today");

    const num = document.createElement("div");
    num.textContent = d;
    num.style.fontWeight = "bold";
    cell.appendChild(num);

    getEvents(dateObj).forEach(ev => {
      const evEl = document.createElement("div");
      evEl.className = "event";
      evEl.style.background = ev.color;
      evEl.textContent = ev.title;
      evEl.dataset.id = ev.id;

      evEl.addEventListener("click", e => {
        e.stopPropagation();
        openEdit(ev.id);
      });

      cell.appendChild(evEl);
    });

    let tapTimer = null;

    cell.addEventListener("click", () => {
      if (tapTimer == null) {
        tapTimer = setTimeout(() => {
          tapTimer = null;
          openList(dateStr);
        }, 250);
      } else {
        clearTimeout(tapTimer);
        tapTimer = null;
        openAdd(dateStr);
      }
    });

    calendarEl.appendChild(cell);
  }
}

/* -------------------------
   日付文字列
------------------------- */
function toStr(d){
  const y=d.getFullYear();
  const m=("0"+(d.getMonth()+1)).slice(-2);
  const da=("0"+d.getDate()).slice(-2);
  return `${y}-${m}-${da}`;
}
function isSame(a,b){
  return a.getFullYear()==b.getFullYear() &&
         a.getMonth()==b.getMonth() &&
         a.getDate()==b.getDate();
}

/* -------------------------
   予定取得（繰り返し対応 + 数字が付く日）
------------------------- */
function getEvents(dateObj){
  const res=[];
  const ds=toStr(dateObj);
  const dow=dateObj.getDay();
  const day=dateObj.getDate();
  const mon=dateObj.getMonth()+1;

  events.forEach(ev=>{
    const base=new Date(ev.baseDate);

    if(ev.repeat==="none" && ev.baseDate===ds) res.push(ev);
    if(ev.repeat==="weekly" && dateObj>=base && base.getDay()===dow) res.push(ev);
    if(ev.repeat==="monthly" && dateObj>=base && base.getDate()===day) res.push(ev);
    if(ev.repeat==="yearly" && dateObj>=base &&
       base.getMonth()+1===mon && base.getDate()===day) res.push(ev);

    if (ev.digits && ev.digits.length > 0) {
      const dayStr = String(day);
      if (ev.digits.some(d => dayStr.includes(d))) {
        if (dateObj >= base) res.push(ev);
      }
    }
  });

  return res;
}

/* -------------------------
   モーダル制御
------------------------- */
const modalBg = document.getElementById("modalBg");
const modalTitle = document.getElementById("modalTitle");
const modalEventTitle = document.getElementById("modalEventTitle");
const modalRepeat = document.getElementById("modalRepeat");
const modalDelete = document.getElementById("modalDelete");

document.getElementById("modalClose").onclick = () => {
  modalBg.style.display = "none";
};

/* 色選択 */
document.getElementById("modalColors").onclick = e => {
  if (e.target.tagName === "BUTTON") {
    modalColor = e.target.dataset.color;
  }
};

/* 数字チェック取得 */
function getSelectedDigits() {
  const boxes = document.querySelectorAll("#digitBoxes input");
  return [...boxes].filter(b => b.checked).map(b => b.value);
}

/* 数字チェック反映 */
function setSelectedDigits(arr) {
  const boxes = document.querySelectorAll("#digitBoxes input");
  boxes.forEach(b => b.checked = arr.includes(b.value));
}

/* -------------------------
   予定追加モード
------------------------- */
function openAdd(dateStr){
  selectedDate = dateStr;
  editingId = null;

  modalTitle.textContent = "予定を追加";
  modalEventTitle.value = "";
  modalRepeat.value = "none";
  modalColor = "#007bff";
  modalDelete.style.display = "none";
  setSelectedDigits([]);

  modalBg.style.display = "flex";
}

/* -------------------------
   予定編集モード
------------------------- */
function openEdit(id){
  editingId = id;
  const ev = events.find(e => e.id === id);

  modalTitle.textContent = "予定を編集";
  modalEventTitle.value = ev.title;
  modalRepeat.value = ev.repeat;
  modalColor = ev.color;
  modalDelete.style.display = "inline-block";
  setSelectedDigits(ev.digits || []);

  modalBg.style.display = "flex";
}

/* -------------------------
   保存ボタン
------------------------- */
document.getElementById("modalSave").onclick = () => {
  const title = modalEventTitle.value.trim();
  if (!title) return;

  const repeat = modalRepeat.value;
  const digits = getSelectedDigits();

  if (editingId === null) {
    events.push({
      id: Date.now().toString(),
      title,
      color: modalColor,
      baseDate: selectedDate,
      repeat,
      digits
    });
  } else {
    const ev = events.find(e => e.id === editingId);
    ev.title = title;
    ev.color = modalColor;
    ev.repeat = repeat;
    ev.digits = digits;
  }

  saveEvents();
  modalBg.style.display = "none";
  renderCalendar();
};

/* -------------------------
   削除ボタン
------------------------- */
modalDelete.onclick = () => {
  events = events.filter(e => e.id !== editingId);
  saveEvents();
  modalBg.style.display = "none";
  renderCalendar();
};

/* -------------------------
   予定一覧モーダル
------------------------- */
const listModalBg = document.getElementById("listModalBg");
const listContent = document.getElementById("listContent");
const listModalTitle = document.getElementById("listModalTitle");

function openList(dateStr){
  const dateObj = new Date(dateStr);
  listModalTitle.textContent = `${dateObj.getMonth()+1}月${dateObj.getDate()}日の予定`;

  const list = getEvents(dateObj);

  if (list.length === 0) {
    listContent.innerHTML = "<p>予定はありません</p>";
  } else {
    listContent.innerHTML = list.map(ev => `
      <div style="margin:6px 0;padding:6px;background:#f0f0f0;border-radius:4px;">
        <b style="color:${ev.color}">${ev.title}</b><br>
        <button onclick="openEdit('${ev.id}')">編集</button>
        <button onclick="deleteFromList('${ev.id}')">削除</button>
      </div>
    `).join("");
  }

  listModalBg.style.display = "flex";
}

function deleteFromList(id){
  events = events.filter(e => e.id !== id);
  saveEvents();
  listModalBg.style.display = "none";
  renderCalendar();
}

document.getElementById("listClose").onclick = () => {
  listModalBg.style.display = "none";
};

/* -------------------------
   月移動
------------------------- */
document.getElementById("prevMonth").onclick = () => {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
};
document.getElementById("nextMonth").onclick = () => {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
};

/* -------------------------
   スワイプで月切り替え
------------------------- */
let startX = 0;
const swipeArea = document.getElementById("swipeArea");

swipeArea.addEventListener("touchstart", e => {
  startX = e.touches[0].clientX;
});
swipeArea.addEventListener("touchend", e => {
  const diff = e.changedTouches[0].clientX - startX;
  if (Math.abs(diff) > 50) {
    if (diff < 0) {
      currentMonth++;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    } else {
      currentMonth--;
      if (currentMonth < 0) { currentMonth = 11; currentYear--; }
    }
    renderCalendar();
  }
});

/* -------------------------
   初期描画
------------------------- */
renderCalendar();
</script>
</body>
</html>
